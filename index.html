<!DOCTYPE html>
<html>
<head>
    <title>Coding Animation</title>
    <style>
        body {
            background-color: #0d1117;
            color: #00ff9c;
            font-family: Consolas, monospace;
            text-align: center;
            margin-top: 100px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #21262d;
            color: #00ff9c;
            border: 1px solid #00ff9c;
            border-radius: 8px;
            cursor: pointer;
        }

        #codeBox {
            display: none;
            margin: 30px auto;
            width: 70%;
            text-align: left;
            background-color: #161b22;
            padding: 20px;
            border-radius: 10px;
            min-height: 200px;
        }
    </style>
</head>
<body>

    <h1>Click to See Coding</h1>
    <button onclick="startTyping()">Click Me</button>

    <div id="codeBox">
        <pre id="code"></pre>
    </div>

    <script>
        const codeText = `<html>
    <head>
        <title>This is how coding looks</title>
    </head>
    <body>
        Hello World!
    </body>
</html>`;

        let i = 0;

        function startTyping() {
            document.getElementById("codeBox").style.display = "block";
            typeWriter();
        }

        function typeWriter() {
            if (i < codeText.length) {
                document.getElementById("code").innerHTML += codeText.charAt(i);
                i++;
                setTimeout(typeWriter, 30);
            }
        }
    </script>

</body>
</html>
